name: Feature request
description: Suggest an idea or improvement for mini
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! mini aims to stay small and send Claude only the
        essentials — proposals that keep that spirit are the easiest to land.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does mini get in the way today?
      placeholder: When I … I have to … because mini does not …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like mini to do? A command, a flag, an output change…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — examples, related tools, links.
    validations:
      required: false
