name: Bug report
description: Report something in mini that does not work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the fields
        below so we can reproduce it quickly. For a usage question rather than a
        bug, use the Discussions link instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true
        - label: I am on the latest version (`mini upgrade`) or this reproduces on it.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: Running `mini done` … I expected … but instead …
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. mini init …
        2. mini next …
        3. mini done
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Command output / logs
      description: Paste the relevant terminal output. This is rendered as code, no need for backticks.
      render: shell
    validations:
      required: false

  - type: input
    id: mini-version
    attributes:
      label: mini version
      description: Output of `mini --version`.
      placeholder: e.g. 1.14.1
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v20.19.2
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Debian 13, macOS 14, Windows 11
    validations:
      required: true
